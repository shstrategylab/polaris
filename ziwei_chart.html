<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗數 命盤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;900&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a0f00; --silk:#f5ede0; --gold:#c8943a; --gold-light:#e8c07a;
  --gold-dim:#8a6020; --vermilion:#c0392b; --jade:#2e7d5e; --lapis:#1a4a7a;
  --paper:#faf3e8; --paper-dark:#ede3d0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--ink); color:var(--ink);
  font-family:'Noto Serif KR','Noto Serif SC',serif; min-height:100vh;
  background-image:
    radial-gradient(ellipse at 20% 20%,#2a1a08 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,#1a0808 0%,transparent 50%),
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(200,148,58,.03) 40px,rgba(200,148,58,.03) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(200,148,58,.03) 40px,rgba(200,148,58,.03) 41px);
}
.app-wrapper{max-width:1060px;margin:0 auto;padding:30px 16px;}

/* 헤더 */
.app-header{text-align:center;padding:38px 0 28px;}
.header-orn{color:var(--gold);font-size:13px;letter-spacing:8px;opacity:.7;margin-bottom:10px;}
.header-cn{font-family:'Noto Serif SC',serif;font-size:50px;font-weight:700;color:var(--gold);letter-spacing:16px;line-height:1;text-shadow:0 0 40px rgba(200,148,58,.4);}
.header-kr{font-size:15px;color:var(--gold-light);letter-spacing:6px;margin-top:8px;opacity:.8;}
.header-line{width:280px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:18px auto 0;}

/* 입력 폼 */
.input-panel{
  background:linear-gradient(135deg,#2a1e0e,#1a1208);
  border:1px solid rgba(200,148,58,.3);border-radius:4px;
  padding:34px 36px;margin:28px 0;
  box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 1px 0 rgba(200,148,58,.1);
  position:relative;
}
.input-panel::before{
  content:'生年月日時';position:absolute;top:-11px;left:50%;transform:translateX(-50%);
  background:#1a1208;padding:0 16px;color:var(--gold);font-size:13px;letter-spacing:4px;
  font-family:'Noto Serif SC',serif;
}
.input-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:20px;}
.input-row{display:grid;grid-template-columns:1fr 1fr auto;gap:18px;align-items:end;}
@media(max-width:680px){
  .input-grid{grid-template-columns:1fr 1fr;}
  .input-row{grid-template-columns:1fr 1fr;}.btn-gen{grid-column:1/-1;}
}
.input-group label{display:block;font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:7px;}
.input-group input,.input-group select{
  width:100%;background:rgba(200,148,58,.06);border:1px solid rgba(200,148,58,.25);border-radius:2px;
  color:var(--silk);font-family:'Noto Serif KR',serif;font-size:15px;padding:9px 12px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.input-group input:focus,.input-group select:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,148,58,.15);}
.input-group select option{background:#1a1208;}
.btn-gen{
  background:linear-gradient(135deg,#c8943a,#8a6020);border:none;border-radius:2px;
  color:var(--ink);font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;
  padding:10px 28px;cursor:pointer;letter-spacing:4px;height:42px;white-space:nowrap;
  box-shadow:0 4px 16px rgba(200,148,58,.3);transition:all .2s;
}
.btn-gen:hover{background:linear-gradient(135deg,#e8c07a,#c8943a);transform:translateY(-1px);box-shadow:0 6px 24px rgba(200,148,58,.5);}

/* 결과 */
#result-section{display:none;}
.chart-header{text-align:center;padding:18px 0 14px;}
.chart-title{color:var(--gold);font-size:21px;letter-spacing:6px;font-family:'Noto Serif SC',serif;}
.chart-sub{color:var(--gold-light);font-size:12px;letter-spacing:2px;margin-top:5px;opacity:.8;}

/* 명반 그리드 */
.mingpan-wrap{
  background:var(--paper);border:2px solid var(--gold-dim);position:relative;
  box-shadow:0 0 0 6px var(--ink),0 0 0 7px rgba(200,148,58,.2),0 18px 56px rgba(0,0,0,.6);
  margin:0 auto;max-width:1000px;
}
.mingpan-wrap::before{
  content:'';position:absolute;inset:4px;
  border:1px solid rgba(200,148,58,.28);pointer-events:none;z-index:10;
}
.mingpan-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(4,minmax(145px,auto));gap:0;
}
.palace-cell{
  border:1px solid rgba(180,140,80,.38);padding:8px 8px 24px;
  position:relative;background:var(--paper);overflow:hidden;
  transition:background .15s;
}
.palace-cell:hover{background:#f0e8d8;}
.palace-center{
  grid-column:2/4;grid-row:2/4;
  border:1px solid rgba(180,140,80,.38);
  background:linear-gradient(135deg,#f5ede0,#ece2cf);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;
}

/* 궁 내부 */
.p-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;}
.p-name{font-size:12px;font-weight:700;color:var(--vermilion);letter-spacing:1px;font-family:'Noto Serif SC',serif;}
.p-branch{font-size:10px;color:var(--gold-dim);font-family:'Noto Serif SC',serif;}
.p-subname{font-size:10px;color:#999;margin-bottom:4px;letter-spacing:.5px;}
.p-stars{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;}
.tag-ming{display:inline-block;font-size:9px;padding:1px 4px;background:var(--vermilion);color:#fff;border-radius:1px;margin-left:3px;font-family:'Noto Serif SC',serif;vertical-align:middle;}
.tag-shen{display:inline-block;font-size:9px;padding:1px 4px;background:var(--jade);color:#fff;border-radius:1px;margin-left:3px;font-family:'Noto Serif SC',serif;vertical-align:middle;}

/* 성요 태그 */
.s{font-size:11px;padding:1px 4px;border-radius:1px;letter-spacing:.5px;font-family:'Noto Serif SC',serif;display:inline-flex;align-items:center;gap:1px;}
.s-main{background:rgba(138,28,28,.1);color:#8a1c1c;border:1px solid rgba(138,28,28,.22);font-weight:700;font-size:12px;}
.s-good{background:rgba(26,74,122,.08);color:var(--lapis);border:1px solid rgba(26,74,122,.18);font-size:10px;}
.s-bad {background:rgba(110,36,36,.07);color:#7a3232;border:1px solid rgba(110,36,36,.15);font-size:10px;}

/* 사화 뱃지 */
.tb{font-size:9px;padding:0 2px;border-radius:1px;line-height:1.5;font-family:'Noto Serif SC',serif;}
.tb-lu{color:#b87020;background:rgba(200,148,58,.15);border:1px solid rgba(200,148,58,.3);}
.tb-quan{color:#c04010;background:rgba(192,64,16,.1);border:1px solid rgba(192,64,16,.25);}
.tb-ke{color:#1e6e48;background:rgba(46,125,94,.1);border:1px solid rgba(46,125,94,.25);}
.tb-ji{color:#8a1c1c;background:rgba(138,28,28,.12);border:1px solid rgba(138,28,28,.28);}

/* 대한 */
.dh-info{position:absolute;bottom:4px;right:7px;font-size:9px;color:var(--gold-dim);letter-spacing:.5px;}

/* 중앙 패널 */
.c-title{font-family:'Noto Serif SC',serif;font-size:21px;font-weight:700;color:var(--gold);letter-spacing:6px;text-align:center;}
.c-divider{width:80%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin:12px auto;}
.c-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;text-align:center;width:100%;}
.c-item .lbl{font-size:9px;color:var(--gold-dim);letter-spacing:2px;font-family:'Noto Serif SC',serif;}
.c-item .val{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:1px;font-family:'Noto Serif SC',serif;display:block;margin-top:1px;}

/* 하단 패널 공통 */
.bottom-panel{
  background:linear-gradient(135deg,#2a1e0e,#1a1208);
  border:1px solid rgba(200,148,58,.28);border-radius:2px;
  padding:22px 26px;margin-top:16px;max-width:1000px;margin-left:auto;margin-right:auto;
}
.panel-title{color:var(--gold);font-size:13px;letter-spacing:5px;margin-bottom:14px;font-family:'Noto Serif SC',serif;text-align:center;}
.dh-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
@media(max-width:680px){.dh-grid{grid-template-columns:repeat(3,1fr);}}
.dh-item{background:rgba(200,148,58,.06);border:1px solid rgba(200,148,58,.14);border-radius:2px;padding:8px 5px;text-align:center;}
.dh-age{font-size:10px;color:var(--gold);letter-spacing:.5px;}
.dh-br{font-size:15px;font-weight:600;color:var(--silk);font-family:'Noto Serif SC',serif;margin:2px 0;}
.dh-palace{font-size:9px;color:rgba(245,237,224,.4);}

.trans-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:680px){.trans-grid{grid-template-columns:1fr 1fr;}}
.trans-item{background:rgba(200,148,58,.06);border:1px solid rgba(200,148,58,.14);border-radius:2px;padding:12px 8px;text-align:center;}
.trans-type{font-size:11px;letter-spacing:2px;font-family:'Noto Serif SC',serif;}
.trans-star{font-size:18px;font-weight:700;color:var(--silk);font-family:'Noto Serif SC',serif;margin-top:3px;}
.trans-desc{font-size:9px;color:rgba(245,237,224,.38);margin-top:3px;letter-spacing:1px;}

.app-footer{text-align:center;padding:28px 0 18px;font-size:11px;color:rgba(200,148,58,.28);letter-spacing:2px;}

@media(max-width:680px){
  .palace-cell{padding:5px 5px 20px;}
  .s-main{font-size:10px;}.s{font-size:9px;}
  .p-name{font-size:11px;}
  .mingpan-grid{grid-template-rows:repeat(4,minmax(110px,auto));}
}
</style>
</head>
<body>
<div class="app-wrapper">

<!-- 헤더 -->
<div class="app-header">
  <div class="header-orn">◆ &nbsp;&nbsp;&nbsp; ◆ &nbsp;&nbsp;&nbsp; ◆</div>
  <div class="header-cn">紫微斗數</div>
  <div class="header-kr">자 미 두 수 명 반</div>
  <div class="header-line"></div>
</div>

<!-- 입력 -->
<div class="input-panel">
  <div class="input-grid">
    <div class="input-group">
      <label>생년 (양력)</label>
      <input type="number" id="in-year" min="1940" max="2050" value="1975">
    </div>
    <div class="input-group">
      <label>월</label>
      <input type="number" id="in-month" min="1" max="12" value="9">
    </div>
    <div class="input-group">
      <label>일</label>
      <input type="number" id="in-day" min="1" max="31" value="2">
    </div>
    <div class="input-group">
      <label>성별</label>
      <select id="in-gender">
        <option value="male">남 (男)</option>
        <option value="female">여 (女)</option>
      </select>
    </div>
  </div>
  <div class="input-row">
    <div class="input-group">
      <label>생시 (0~23시)</label>
      <input type="number" id="in-hour" min="0" max="23" value="0">
    </div>
    <div class="input-group">
      <label>분 (옵션)</label>
      <input type="number" id="in-minute" min="0" max="59" value="0">
    </div>
    <button class="btn-gen" onclick="generateChart()">命 盤 작 성</button>
  </div>
</div>

<!-- 결과 -->
<div id="result-section">
  <div class="chart-header">
    <div class="chart-title" id="chart-title">命 盤</div>
    <div class="chart-sub" id="chart-sub"></div>
  </div>
  <div class="mingpan-wrap">
    <div class="mingpan-grid" id="mingpan-grid"></div>
  </div>
  <div class="bottom-panel">
    <div class="panel-title">大 限 運 程</div>
    <div class="dh-grid" id="dh-grid"></div>
  </div>
  <div class="bottom-panel">
    <div class="panel-title">四 化 星 配 置</div>
    <div class="trans-grid" id="trans-grid"></div>
  </div>
</div>

<div class="app-footer">紫微斗數 &nbsp;·&nbsp; 전통 명리학 기반 &nbsp;·&nbsp; 참고용으로만 활용하세요</div>
</div>

<script>

// 록존 (천간→궁)

// ============================================================
// 음양력 변환 함수
// ============================================================
function d2j(y,m,d){
  if(m<=2){y--;m+=12;}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524;
}

function solar2lunar(sy,sm,sd){
  const inp=d2j(sy,sm,sd);
  // 해당 양력 날짜가 어느 음력연도인지 결정
  let ly=sy;
  if(LDB[sy]){
    const ny=d2j(sy,LDB[sy][0],LDB[sy][1]);
    if(inp<ny) ly=sy-1;
  } else { ly=sy-1; }

  const rec=LDB[ly];
  if(!rec) return {y:sy,m:sm,d:sd,leap:false,stem:getStem(sy),branch:getBranch(sy)};

  const [bm,bd,months,leapM]=rec;
  let rem=inp-d2j(ly,bm,bd);
  if(rem<0) return {y:ly,m:1,d:1,leap:false,stem:getStem(ly),branch:getBranch(ly)};

  // months 배열: 윤달이 있으면 13개, 없으면 12개
  // leapM: n번째 정상달 다음이 윤달 (1-based)
  let lm=1, isLeap=false;
  for(let i=0;i<months.length;i++){
    if(rem<months[i]){
      // 윤달 체크: leapM>0이고 이 인덱스가 윤달 삽입 위치인지 판단
      if(leapM>0){
        if(i<leapM){ lm=i+1; isLeap=false; }
        else if(i===leapM){ lm=leapM; isLeap=true; }
        else { lm=i; isLeap=false; }
      } else {
        lm=i+1; isLeap=false;
      }
      break;
    }
    rem-=months[i];
    if(i===months.length-1){ lm=months.length; }
  }
  return {y:ly,m:lm,d:rem+1,leap:isLeap,stem:getStem(ly),branch:getBranch(ly)};
}

function getStem(y){ return STEMS[(y-4+1000)%10]; }
function getBranch(y){ return BRANCHES[(y-4+1000)%12]; }
function hIdx(h){ return Math.floor(((h+1)%24)/2); }
function hBranch(h){ return BRANCHES[hIdx(h)]; }

// 핵심 계산 함수들
// ============================================================

// 명궁: 인월(음력1월)=寅宮(2)에서 순행, 시지만큼 역행
function getMingPos(lm,hour){
  const hi=hIdx(hour);
  return ((2+(lm-1))-hi+12)%12;
}

// 신궁: 인월=寅宮(2)에서 순행, 시지만큼 순행
function getShenPos(lm,hour){
  return (2+(lm-1)+hIdx(hour))%12;
}

// 14주성 배치
function placeMain(zp){
  const arr=Array.from({length:12},()=>[]);
  const tf=ZI_TO_TF[zp];
  ZN.forEach((cn,i)=> arr[ZG[zp][i]].push({cn,kr:ZK[i],cat:"main"}));
  FN.forEach((cn,i)=> arr[FG[tf][i]].push({cn,kr:FK[i],cat:"main"}));
  return arr;
}

// 보조성 배치
function placeMinor(stem,branch,lm,hour){
  const arr=Array.from({length:12},()=>[]);
  const hi=hIdx(hour);

  // 좌보: 辰(4-1=3로 인덱스)에서 월 순행
  // 실제 전통법: 음력 1월→辰(4번), 즉 인덱스3+월-1
  // 정확히는 辰(인덱스4)에서 1월시작 순행
  arr[(3+lm-1)%12].push({cn:"左輔",kr:"좌보",cat:"good"});

  // 우필: 戌(10번)에서 역행
  arr[(10-(lm-1)+12)%12].push({cn:"右弼",kr:"우필",cat:"good"});

  // 문창: 戌(10)에서 시지만큼 역행
  arr[(10-hi+12)%12].push({cn:"文昌",kr:"문창",cat:"good"});

  // 문곡: 辰(4)에서 시지만큼 순행 — 인덱스 3
  arr[(3+hi)%12].push({cn:"文曲",kr:"문곡",cat:"good"});

  // 천괴·천월
  arr[KUEI[stem]??0].push({cn:"天魁",kr:"천괴",cat:"good"});
  arr[YUEH[stem]??0].push({cn:"天鉞",kr:"천월",cat:"good"});

  // 록존·경양·타라
  const lz=LUZUN[stem]??0;
  arr[lz].push({cn:"祿存",kr:"록존",cat:"good"});
  arr[(lz+1)%12].push({cn:"擎羊",kr:"경양",cat:"bad"});
  arr[(lz-1+12)%12].push({cn:"陀羅",kr:"타라",cat:"bad"});

  // 천마
  arr[TIANMA[branch]??2].push({cn:"天馬",kr:"천마",cat:"good"});

  // 화성·영성
  arr[((HX_BASE[branch]??1)+hi)%12].push({cn:"火星",kr:"화성",cat:"bad"});
  arr[((LX_BASE[branch]??3)+hi)%12].push({cn:"鈴星",kr:"영성",cat:"bad"});

  // 지공: 亥(11)에서 역행
  arr[(11-hi+12)%12].push({cn:"地空",kr:"지공",cat:"bad"});

  // 지겁: 亥(11)에서 순행
  arr[(11+hi)%12].push({cn:"地劫",kr:"지겁",cat:"bad"});

  return arr;
}

function generateChart(){
  const sy=parseInt(document.getElementById('in-year').value)||1975;
  const sm=parseInt(document.getElementById('in-month').value)||9;
  const sd=parseInt(document.getElementById('in-day').value)||2;
  const hour=parseInt(document.getElementById('in-hour').value)||0;
  const gender=document.getElementById('in-gender').value;

  const L=solar2lunar(sy,sm,sd);
  const stem=L.stem, branch=L.branch;
  const nayin=NAYIN[stem+branch]||"不明";
  const ju=EL_TO_JU[nayin.slice(-1)]||5;

  // 자미성 위치
  const ztbl=ZIWEI_TBL[ju];
  const lday=Math.max(1,Math.min(30,L.d));
  const zp=ztbl[lday-1];

  // 명궁·신궁
  const mingPos=getMingPos(L.m,hour);
  const shenPos=getShenPos(L.m,hour);

  // 성요 배치
  const mainS=placeMain(zp);
  const minorS=placeMinor(stem,branch,L.m,hour);
  const tr=TRANS[stem]||{};

  // 사화 위치 맵
  const trMap={};
  for(const [type,starCn] of Object.entries(tr)){
    for(let p=0;p<12;p++){
      if(mainS[p].find(s=>s.cn===starCn)||minorS[p].find(s=>s.cn===starCn)){
        if(!trMap[p]) trMap[p]=[];
        const lbl={"化祿":"祿","化權":"權","化科":"科","化忌":"忌"}[type]||"";
        const cls={"化祿":"tb-lu","化權":"tb-quan","化科":"tb-ke","化忌":"tb-ji"}[type]||"";
        trMap[p].push({star:starCn,type,lbl,cls});
        break;
      }
    }
  }

  // 대한 (양년+남 / 음년+여 = 순행, 나머지 역행)
  const stemIdx=STEMS.indexOf(stem);
  const isYang=[0,2,4,6,8].includes(stemIdx);
  const isMale=(gender==='male');
  const fwd=(isYang&&isMale)||(!isYang&&!isMale);

  const daihan=[];
  for(let i=0;i<12;i++){
    const age=ju+i*10;
    const pos=fwd?(mingPos+i)%12:(mingPos-i+12)%12;
    daihan.push({i,age,endAge:age+9,pos,br:BRANCHES[pos],brkr:BR_KR[pos]});
  }

  // 궁 데이터 조립
  const palaces=[];
  for(let i=0;i<12;i++){
    const seq=(i-mingPos+12)%12;
    palaces.push({
      bi:i,br:BRANCHES[i],brkr:BR_KR[i],
      pname:PALACE_NAMES[seq],
      main:mainS[i],minor:minorS[i],
      ming:i===mingPos,shen:i===shenPos,
      tr:trMap[i]||[],
      dh:daihan.find(d=>d.pos===i),
    });
  }

  // UI
  const juName={2:"水二局",3:"木三局",4:"金四局",5:"土五局",6:"火六局"};
  document.getElementById('chart-title').textContent=`${L.y}年 ${stem}${branch} 命盤`;
  document.getElementById('chart-sub').textContent=
    `음력 ${L.y}.${L.m}${L.leap?'(윤)':''}.${L.d} · ${hour}시(${hBranch(hour)}時) · ${nayin} · ${juName[ju]||ju+'국'}`;

  renderGrid(palaces,{sy,sm,sd,hour,gender,L,stem,branch,nayin,ju});
  renderDaihan(daihan);
  renderTrans(tr);

  const rs=document.getElementById('result-section');
  rs.style.display='block';
  rs.scrollIntoView({behavior:'smooth',block:'start'});
}

  const cells=Array(16).fill(null);

    const r=Math.floor(i/4),c=i%4;
    const isC=(r===1||r===2)&&(c===1||c===2);
    if(isC){
      if(i===5){
        const div=document.createElement('div');
        div.className='palace-center';
        div.style.cssText='grid-column:2/4;grid-row:2/4;';
        div.innerHTML=renderCenter(info);
        grid.appendChild(div);
      }
      continue;
    }
    const p=cells[i];
    const cell=document.createElement('div');
    cell.className='palace-cell';
    if(!p){ grid.appendChild(cell); continue; }

    const tags=(p.ming?'<span class="tag-ming">命</span>':'')+
               (p.shen?'<span class="tag-shen">身</span>':'');

    const mainH=p.main.map(s=>{
      const badges=p.tr.filter(t=>t.star===s.cn).map(t=>`<span class="tb ${t.cls}">${t.lbl}</span>`).join('');
      return `<span class="s s-main">${s.cn}${badges}</span>`;
    }).join('');

    const minorH=p.minor.map(s=>{
      const cls=s.cat==='good'?'s-good':'s-bad';
      const badges=p.tr.filter(t=>t.star===s.cn).map(t=>`<span class="tb ${t.cls}">${t.lbl}</span>`).join('');
      return `<span class="s ${cls}">${s.cn}${badges}</span>`;
    }).join('');

    const dh=p.dh?`<div class="dh-info">${p.dh.age}~${p.dh.endAge}세</div>`:'';

    cell.innerHTML=`
      <div class="p-head">
        <div><span class="p-name">${p.pname.cn}</span>${tags}</div>
        <span class="p-branch">${p.brkr}(${p.br})</span>
      </div>
      <div class="p-subname">【${p.pname.kr}】</div>
      <div class="p-stars">${mainH}${minorH}</div>
      ${dh}
    `;
    grid.appendChild(cell);
  }
}

function renderCenter(info){
  const juName={2:"水二局",3:"木三局",4:"金四局",5:"土五局",6:"火六局"};
  const g=info.gender==='male'?'남(男)':'여(女)';
  return `
    <div class="c-title">紫微斗數<br>命　盤</div>
    <div class="c-divider"></div>
    <div class="c-grid">
      <div class="c-item"><span class="lbl">연주</span><span class="val">${info.stem}${info.branch}年</span></div>
      <div class="c-item"><span class="lbl">납음</span><span class="val">${info.nayin}</span></div>
      <div class="c-item"><span class="lbl">오행국</span><span class="val">${juName[info.ju]||info.ju}</span></div>
      <div class="c-item"><span class="lbl">성별</span><span class="val">${g}</span></div>
      <div class="c-item"><span class="lbl">음력</span><span class="val">${info.L.y}.${info.L.m}.${info.L.d}</span></div>
      <div class="c-item"><span class="lbl">생시</span><span class="val">${hBranch(info.hour)}時(${info.hour}시)</span></div>
    </div>
  `;
}

function renderDaihan(list){
  document.getElementById('dh-grid').innerHTML=list.map(d=>`
    <div class="dh-item">
      <div class="dh-age">${d.age}~${d.endAge}세</div>
      <div class="dh-br">${d.br}</div>
      <div class="dh-palace">${d.brkr}궁</div>
    </div>
  `).join('');
}

function renderTrans(tr){
  const types=[
    {k:"化祿",lbl:"化祿 화록",desc:"재물·복록",color:"#b87020"},
    {k:"化權",lbl:"化權 화권",desc:"권위·리더십",color:"#c04010"},
    {k:"化科",lbl:"化科 화과",desc:"명예·학문",color:"#1e6e48"},
    {k:"化忌",lbl:"化忌 화기",desc:"장애·주의",color:"#8a1c1c"},
  ];
  document.getElementById('trans-grid').innerHTML=types.map(t=>`
    <div class="trans-item">
      <div class="trans-type" style="color:${t.color}">${t.lbl}</div>
      <div class="trans-star">${tr[t.k]||'—'}</div>
      <div class="trans-desc">${t.desc}</div>
    </div>
  `).join('');
}

document.addEventListener('keydown',e=>{ if(e.key==='Enter') generateChart(); });
</script>
</body>
</html>
