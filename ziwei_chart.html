<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗數 命盤 — 자미두수 명반</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;900&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
<script src="ziwei_data.js" defer></script>
<style>
  :root {
    --ink: #1a0f00;
    --silk: #f5ede0;
    --gold: #c8943a;
    --gold-light: #e8c07a;
    --gold-dim: #8a6020;
    --vermilion: #c0392b;
    --jade: #2e7d5e;
    --lapis: #1a4a7a;
    --paper: #faf3e8;
    --paper-dark: #ede3d0;
    --shadow: rgba(26,15,0,0.15);
    --star-main: #8a1c1c;
    --star-aux-good: #1a4a7a;
    --star-aux-bad: #6b2020;
    --star-transform: #5a3a00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--ink);
    font-family: 'Noto Serif KR', 'Noto Serif SC', serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, #2a1a08 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, #1a0808 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(200,148,58,0.03) 40px, rgba(200,148,58,0.03) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(200,148,58,0.03) 40px, rgba(200,148,58,0.03) 41px);
  }

  .app-wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  /* ── 헤더 ── */
  .app-header {
    text-align: center;
    padding: 40px 0 30px;
    position: relative;
  }
  .header-ornament {
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 8px;
    opacity: 0.7;
    margin-bottom: 10px;
  }
  .header-title-cn {
    font-family: 'Noto Serif SC', serif;
    font-size: 52px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 16px;
    line-height: 1;
    text-shadow: 0 0 40px rgba(200,148,58,0.4);
  }
  .header-title-kr {
    font-size: 16px;
    color: var(--gold-light);
    letter-spacing: 6px;
    margin-top: 8px;
    opacity: 0.8;
  }
  .header-line {
    width: 300px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
  }

  /* ── 입력 폼 ── */
  .input-panel {
    background: linear-gradient(135deg, #2a1e0e, #1a1208);
    border: 1px solid rgba(200,148,58,0.3);
    border-radius: 4px;
    padding: 36px 40px;
    margin: 30px 0;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(200,148,58,0.1);
    position: relative;
  }
  .input-panel::before {
    content: '生年月日時';
    position: absolute;
    top: -11px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1208;
    padding: 0 16px;
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 4px;
    font-family: 'Noto Serif SC', serif;
  }

  .input-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 700px) {
    .input-grid { grid-template-columns: 1fr 1fr; }
  }

  .input-group label {
    display: block;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .input-group input, .input-group select {
    width: 100%;
    background: rgba(200,148,58,0.06);
    border: 1px solid rgba(200,148,58,0.25);
    border-radius: 2px;
    color: var(--silk);
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-group input:focus, .input-group select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(200,148,58,0.15);
  }
  .input-group select option { background: #1a1208; }

  .input-row-bottom {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 20px;
    align-items: end;
  }
  @media (max-width: 700px) {
    .input-row-bottom { grid-template-columns: 1fr 1fr; }
    .input-row-bottom .btn-generate { grid-column: 1/-1; }
  }

  .btn-generate {
    background: linear-gradient(135deg, #c8943a, #8a6020);
    border: none;
    border-radius: 2px;
    color: var(--ink);
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 700;
    padding: 12px 32px;
    cursor: pointer;
    letter-spacing: 4px;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(200,148,58,0.3);
    height: 44px;
    white-space: nowrap;
  }
  .btn-generate:hover {
    background: linear-gradient(135deg, #e8c07a, #c8943a);
    box-shadow: 0 6px 24px rgba(200,148,58,0.5);
    transform: translateY(-1px);
  }

  /* ── 결과 패널 ── */
  #result-section { display: none; }

  .chart-header {
    text-align: center;
    padding: 20px 0 16px;
  }
  .chart-title {
    color: var(--gold);
    font-size: 22px;
    letter-spacing: 6px;
    font-family: 'Noto Serif SC', serif;
  }
  .chart-subtitle {
    color: var(--gold-light);
    font-size: 13px;
    letter-spacing: 3px;
    margin-top: 6px;
    opacity: 0.8;
  }

  /* ── 명반 격자 ── */
  .mingpan-container {
    background: var(--paper);
    border: 2px solid var(--gold-dim);
    position: relative;
    box-shadow: 0 0 0 6px var(--ink), 0 0 0 7px rgba(200,148,58,0.2), 0 20px 60px rgba(0,0,0,0.6);
    margin: 0 auto;
    max-width: 900px;
  }
  .mingpan-container::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(200,148,58,0.3);
    pointer-events: none;
    z-index: 10;
  }

  .mingpan-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 0;
  }

  .palace-cell {
    border: 1px solid rgba(180,140,80,0.4);
    padding: 10px 8px 8px;
    min-height: 130px;
    position: relative;
    background: var(--paper);
    transition: background 0.2s;
    cursor: pointer;
    overflow: hidden;
  }
  .palace-cell:hover { background: #f0e8d8; }

  /* 중앙 특별 영역 */
  .palace-center {
    grid-column: 2 / 4;
    grid-row: 2 / 4;
    border: 1px solid rgba(180,140,80,0.4);
    background: linear-gradient(135deg, #f5ede0, #ede3d0);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .palace-label {
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 1px;
    margin-bottom: 2px;
    font-family: 'Noto Serif SC', serif;
  }
  .palace-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--vermilion);
    letter-spacing: 2px;
    font-family: 'Noto Serif SC', serif;
  }
  .palace-branch {
    font-size: 11px;
    color: var(--gold-dim);
    margin-top: 1px;
    font-family: 'Noto Serif SC', serif;
  }

  /* 명궁/신궁 표시 */
  .tag-ming, .tag-shen {
    display: inline-block;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 1px;
    margin: 0 1px;
    letter-spacing: 1px;
    font-family: 'Noto Serif SC', serif;
  }
  .tag-ming { background: var(--vermilion); color: white; }
  .tag-shen { background: var(--jade); color: white; }

  .palace-stars {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
  }
  .star-tag {
    font-size: 10px;
    padding: 1px 4px;
    border-radius: 1px;
    letter-spacing: 0.5px;
    font-family: 'Noto Serif SC', serif;
    position: relative;
  }
  .star-main {
    background: rgba(138,28,28,0.12);
    color: var(--star-main);
    border: 1px solid rgba(138,28,28,0.25);
    font-size: 11px;
    font-weight: 600;
  }
  .star-aux-good {
    background: rgba(26,74,122,0.1);
    color: var(--lapis);
    border: 1px solid rgba(26,74,122,0.2);
  }
  .star-aux-bad {
    background: rgba(107,32,32,0.08);
    color: #7a3030;
    border: 1px solid rgba(107,32,32,0.15);
  }
  .transform-badge {
    font-size: 8px;
    color: var(--gold);
    background: rgba(200,148,58,0.15);
    border: 1px solid rgba(200,148,58,0.3);
    padding: 0px 3px;
    border-radius: 1px;
    position: absolute;
    top: -7px;
    right: -3px;
  }

  /* 대한 표시 */
  .daihan-info {
    position: absolute;
    bottom: 5px;
    right: 6px;
    font-size: 9px;
    color: var(--gold-dim);
    letter-spacing: 0.5px;
    font-family: 'Noto Serif SC', serif;
  }

  /* ── 중앙 정보 ── */
  .center-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 6px;
    text-align: center;
    line-height: 1.4;
  }
  .center-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    margin-top: 16px;
    text-align: center;
  }
  .center-info-item { font-size: 11px; }
  .center-info-label { color: var(--gold-dim); letter-spacing: 2px; font-family: 'Noto Serif SC', serif; }
  .center-info-value { color: var(--ink); font-weight: 600; letter-spacing: 1px; font-family: 'Noto Serif SC', serif; display: block; margin-top: 2px; }
  .center-divider { width: 80%; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), transparent); margin: 14px auto; }

  /* ── 대한 테이블 ── */
  .daihan-section {
    background: linear-gradient(135deg, #2a1e0e, #1a1208);
    border: 1px solid rgba(200,148,58,0.3);
    border-radius: 2px;
    padding: 24px 28px;
    margin-top: 20px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  .daihan-title { color: var(--gold); font-size: 14px; letter-spacing: 5px; margin-bottom: 16px; font-family: 'Noto Serif SC', serif; text-align: center; }
  .daihan-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  @media (max-width: 700px) { .daihan-grid { grid-template-columns: repeat(3, 1fr); } }
  .daihan-item { background: rgba(200,148,58,0.06); border: 1px solid rgba(200,148,58,0.15); border-radius: 2px; padding: 8px 6px; text-align: center; }
  .daihan-age { font-size: 10px; color: var(--gold); letter-spacing: 1px; }
  .daihan-branch { font-size: 16px; font-weight: 600; color: var(--silk); font-family: 'Noto Serif SC', serif; margin: 2px 0; }
  .daihan-palace { font-size: 9px; color: rgba(245,237,224,0.5); letter-spacing: 1px; }

  /* ── 설명 패널 ── */
  .info-section {
    background: linear-gradient(135deg, #2a1e0e, #1a1208);
    border: 1px solid rgba(200,148,58,0.2);
    border-radius: 2px;
    padding: 24px 28px;
    margin-top: 16px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  .info-title { color: var(--gold); font-size: 13px; letter-spacing: 4px; margin-bottom: 14px; font-family: 'Noto Serif SC', serif; }
  .four-trans-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (max-width: 700px) { .four-trans-grid { grid-template-columns: 1fr 1fr; } }
  .trans-item { background: rgba(200,148,58,0.06); border: 1px solid rgba(200,148,58,0.15); border-radius: 2px; padding: 12px 8px; text-align: center; }
  .trans-type { font-size: 11px; color: var(--gold); letter-spacing: 2px; font-family: 'Noto Serif SC', serif; }
  .trans-star { font-size: 18px; font-weight: 700; color: var(--silk); font-family: 'Noto Serif SC', serif; margin-top: 4px; }

  .app-footer { text-align: center; padding: 30px 0 20px; font-size: 11px; color: rgba(200,148,58,0.3); letter-spacing: 2px; }
</style>
</head>
<body>
<div class="app-wrapper">
  <div class="app-header">
    <div class="header-ornament">◆ &nbsp; &nbsp; &nbsp; ◆ &nbsp; &nbsp; &nbsp; ◆</div>
    <div class="header-title-cn">紫微斗數</div>
    <div class="header-title-kr">자 미 두 수 명 반</div>
    <div class="header-line"></div>
  </div>

  <div class="input-panel">
    <div class="input-grid">
      <div class="input-group">
        <label>생년 (양력)</label>
        <input type="number" id="in-year" placeholder="예: 1990" min="1900" max="2050" value="1990">
      </div>
      <div class="input-group">
        <label>월</label>
        <input type="number" id="in-month" placeholder="1~12" min="1" max="12" value="5">
      </div>
      <div class="input-group">
        <label>일</label>
        <input type="number" id="in-day" placeholder="1~31" min="1" max="31" value="15">
      </div>
      <div class="input-group">
        <label>성별</label>
        <select id="in-gender">
          <option value="male">남 (男)</option>
          <option value="female">여 (女)</option>
        </select>
      </div>
    </div>
    <div class="input-row-bottom">
      <div class="input-group">
        <label>생시 (24시)</label>
        <input type="number" id="in-hour" placeholder="0~23" min="0" max="23" value="8">
      </div>
      <div class="input-group">
        <label>분 (옵션)</label>
        <input type="number" id="in-minute" placeholder="0~59" min="0" max="59" value="0">
      </div>
      <button class="btn-generate" onclick="generateChart()">命 盤 작 성</button>
    </div>
  </div>

  <div id="result-section">
    <div class="chart-header">
      <div class="chart-title" id="chart-person-name">命 盤</div>
      <div class="chart-subtitle" id="chart-subtitle"></div>
    </div>
    <div class="mingpan-container">
      <div class="mingpan-grid" id="mingpan-grid"></div>
    </div>
    <div class="daihan-section">
      <div class="daihan-title">大 限 運 程</div>
      <div class="daihan-grid" id="daihan-grid"></div>
    </div>
    <div class="info-section">
      <div class="info-title">四 化 星 配 置</div>
      <div class="four-trans-grid" id="four-trans-grid"></div>
    </div>
  </div>

  <div class="app-footer">
    紫微斗數 &nbsp;·&nbsp; 전통 명리학 기반 &nbsp;·&nbsp; 참고용으로만 활용하세요
  </div>
</div>
</body>
</html>
