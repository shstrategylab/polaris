<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗數 命盤 — 자미두수 명반</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;900&family=Noto+Serif+SC:wght@300;400;700&display=swap" rel="stylesheet">
<script src="ziwei_data.js"></script>
<style>
  :root {
    --ink: #1a0f00;
    --silk: #f5ede0;
    --gold: #c8943a;
    --gold-light: #e8c07a;
    --gold-dim: #8a6020;
    --vermilion: #c0392b;
    --jade: #2e7d5e;
    --lapis: #1a4a7a;
    --paper: #faf3e8;
    --paper-dark: #ede3d0;
    --shadow: rgba(26,15,0,0.15);
    --star-main: #8a1c1c;
    --star-aux-good: #1a4a7a;
    --star-aux-bad: #6b2020;
    --star-transform: #5a3a00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--ink);
    font-family: 'Noto Serif KR', 'Noto Serif SC', serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, #2a1a08 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, #1a0808 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(200,148,58,0.03) 40px, rgba(200,148,58,0.03) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(200,148,58,0.03) 40px, rgba(200,148,58,0.03) 41px);
  }

  .app-wrapper {
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  /* ── 헤더 ── */
  .app-header {
    text-align: center;
    padding: 40px 0 30px;
    position: relative;
  }
  .header-ornament {
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 8px;
    opacity: 0.7;
    margin-bottom: 10px;
  }
  .header-title-cn {
    font-family: 'Noto Serif SC', serif;
    font-size: 52px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 16px;
    line-height: 1;
    text-shadow: 0 0 40px rgba(200,148,58,0.4);
  }
  .header-title-kr {
    font-size: 16px;
    color: var(--gold-light);
    letter-spacing: 6px;
    margin-top: 8px;
    opacity: 0.8;
  }
  .header-line {
    width: 300px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto 0;
  }

  /* ── 입력 폼 ── */
  .input-panel {
    background: linear-gradient(135deg, #2a1e0e, #1a1208);
    border: 1px solid rgba(200,148,58,0.3);
    border-radius: 4px;
    padding: 36px 40px;
    margin: 30px 0;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(200,148,58,0.1);
    position: relative;
  }
  .input-panel::before {
    content: '生年月日時';
    position: absolute;
    top: -11px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1208;
    padding: 0 16px;
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 4px;
    font-family: 'Noto Serif SC', serif;
  }

  .input-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 700px) {
    .input-grid { grid-template-columns: 1fr 1fr; }
  }

  .input-group label {
    display: block;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .input-group input, .input-group select {
    width: 100%;
    background: rgba(200,148,58,0.06);
    border: 1px solid rgba(200,148,58,0.25);
    border-radius: 2px;
    color: var(--silk);
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-group input:focus, .input-group select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(200,148,58,0.15);
  }
  .input-group select option { background: #1a1208; }

  .input-row-bottom {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 20px;
    align-items: end;
  }
  @media (max-width: 700px) {
    .input-row-bottom { grid-template-columns: 1fr 1fr; }
    .input-row-bottom .btn-generate { grid-column: 1/-1; }
  }

  .btn-generate {
    background: linear-gradient(135deg, #c8943a, #8a6020);
    border: none;
    border-radius: 2px;
    color: var(--ink);
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 700;
    padding: 12px 32px;
    cursor: pointer;
    letter-spacing: 4px;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(200,148,58,0.3);
    height: 44px;
    white-space: nowrap;
  }
  .btn-generate:hover {
    background: linear-gradient(135deg, #e8c07a, #c8943a);
    box-shadow: 0 6px 24px rgba(200,148,58,0.5);
    transform: translateY(-1px);
  }

  /* ── 결과 패널 ── */
  #result-section { display: none; }

  .chart-header {
    text-align: center;
    padding: 20px 0 16px;
  }
  .chart-title {
    color: var(--gold);
    font-size: 22px;
    letter-spacing: 6px;
    font-family: 'Noto Serif SC', serif;
  }
  .chart-subtitle {
    color: var(--gold-light);
    font-size: 13px;
    letter-spacing: 3px;
    margin-top: 6px;
    opacity: 0.8;
  }

  /* ── 명반 격자 ── */
  .mingpan-container {
    background: var(--paper);
    border: 2px solid var(--gold-dim);
    position: relative;
    box-shadow: 0 0 0 6px var(--ink), 0 0 0 7px rgba(200,148,58,0.2), 0 20px 60px rgba(0,0,0,0.6);
    margin: 0 auto;
    max-width: 900px;
  }
  .mingpan-container::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(200,148,58,0.3);
    pointer-events: none;
    z-index: 10;
  }

  .mingpan-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 0;
  }

  .palace-cell {
    border: 1px solid rgba(180,140,80,0.4);
    padding: 10px 8px 8px;
    min-height: 130px;
    position: relative;
    background: var(--paper);
    transition: background 0.2s;
    cursor: pointer;
    overflow: hidden;
  }
  .palace-cell:hover { background: #f0e8d8; }

  /* 중앙 4칸 = 특별 영역 */
  .palace-center {
    grid-column: 2 / 4;
    grid-row: 2 / 4;
    border: 1px solid rgba(180,140,80,0.4);
    background: linear-gradient(135deg, #f5ede0, #ede3d0);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .palace-label {
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 1px;
    margin-bottom: 2px;
    font-family: 'Noto Serif SC', serif;
  }
  .palace-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--vermilion);
    letter-spacing: 2px;
    font-family: 'Noto Serif SC', serif;
  }
  .palace-branch {
    font-size: 11px;
    color: var(--gold-dim);
    margin-top: 1px;
    font-family: 'Noto Serif SC', serif;
  }

  /* 명궁/신궁 표시 */
  .tag-ming, .tag-shen {
    display: inline-block;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 1px;
    margin: 0 1px;
    letter-spacing: 1px;
    font-family: 'Noto Serif SC', serif;
  }
  .tag-ming {
    background: var(--vermilion);
    color: white;
  }
  .tag-shen {
    background: var(--jade);
    color: white;
  }

  .palace-stars {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
  }
  .star-tag {
    font-size: 10px;
    padding: 1px 4px;
    border-radius: 1px;
    letter-spacing: 0.5px;
    font-family: 'Noto Serif SC', serif;
    position: relative;
  }
  .star-main {
    background: rgba(138,28,28,0.12);
    color: var(--star-main);
    border: 1px solid rgba(138,28,28,0.25);
    font-size: 11px;
    font-weight: 600;
  }
  .star-aux-good {
    background: rgba(26,74,122,0.1);
    color: var(--lapis);
    border: 1px solid rgba(26,74,122,0.2);
  }
  .star-aux-bad {
    background: rgba(107,32,32,0.08);
    color: #7a3030;
    border: 1px solid rgba(107,32,32,0.15);
  }
  .transform-badge {
    font-size: 8px;
    color: var(--gold);
    background: rgba(200,148,58,0.15);
    border: 1px solid rgba(200,148,58,0.3);
    padding: 0px 3px;
    border-radius: 1px;
    position: absolute;
    top: -7px;
    right: -3px;
  }

  /* 대한 표시 */
  .daihan-info {
    position: absolute;
    bottom: 5px;
    right: 6px;
    font-size: 9px;
    color: var(--gold-dim);
    letter-spacing: 0.5px;
    font-family: 'Noto Serif SC', serif;
  }

  /* ── 중앙 정보 ── */
  .center-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 6px;
    text-align: center;
    line-height: 1.4;
  }
  .center-info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    margin-top: 16px;
    text-align: center;
  }
  .center-info-item {
    font-size: 11px;
  }
  .center-info-label {
    color: var(--gold-dim);
    letter-spacing: 2px;
    font-family: 'Noto Serif SC', serif;
  }
  .center-info-value {
    color: var(--ink);
    font-weight: 600;
    letter-spacing: 1px;
    font-family: 'Noto Serif SC', serif;
    display: block;
    margin-top: 2px;
  }
  .center-divider {
    width: 80%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 14px auto;
  }

  /* ── 대한 테이블 ── */
  .daihan-section {
    background: linear-gradient(135deg, #2a1e0e, #1a1208);
    border: 1px solid rgba(200,148,58,0.3);
    border-radius: 2px;
    padding: 24px 28px;
    margin-top: 20px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  .daihan-title {
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 5px;
    margin-bottom: 16px;
    font-family: 'Noto Serif SC', serif;
    text-align: center;
  }
  .daihan-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  @media (max-width: 700px) {
    .daihan-grid { grid-template-columns: repeat(3, 1fr); }
  }
  .daihan-item {
    background: rgba(200,148,58,0.06);
    border: 1px solid rgba(200,148,58,0.15);
    border-radius: 2px;
    padding: 8px 6px;
    text-align: center;
  }
  .daihan-age {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .daihan-branch {
    font-size: 16px;
    font-weight: 600;
    color: var(--silk);
    font-family: 'Noto Serif SC', serif;
    margin: 2px 0;
  }
  .daihan-palace {
    font-size: 9px;
    color: rgba(245,237,224,0.5);
    letter-spacing: 1px;
  }

  /* ── 설명 패널 ── */
  .info-section {
    background: linear-gradient(135deg, #2a1e0e, #1a1208);
    border: 1px solid rgba(200,148,58,0.2);
    border-radius: 2px;
    padding: 24px 28px;
    margin-top: 16px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  .info-title {
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 4px;
    margin-bottom: 14px;
    font-family: 'Noto Serif SC', serif;
  }
  .four-trans-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  @media (max-width: 700px) {
    .four-trans-grid { grid-template-columns: 1fr 1fr; }
  }
  .trans-item {
    background: rgba(200,148,58,0.06);
    border: 1px solid rgba(200,148,58,0.15);
    border-radius: 2px;
    padding: 12px 8px;
    text-align: center;
  }
  .trans-type {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 2px;
    font-family: 'Noto Serif SC', serif;
  }
  .trans-star {
    font-size: 18px;
    font-weight: 700;
    color: var(--silk);
    font-family: 'Noto Serif SC', serif;
    margin-top: 4px;
  }

  /* ── 로딩 ── */
  .loading { display: none; text-align: center; padding: 40px; color: var(--gold); font-size: 14px; letter-spacing: 4px; }

  /* ── 푸터 ── */
  .app-footer {
    text-align: center;
    padding: 30px 0 20px;
    font-size: 11px;
    color: rgba(200,148,58,0.3);
    letter-spacing: 2px;
  }

  /* 반응형 */
  @media (max-width: 700px) {
    .palace-cell { min-height: 90px; padding: 6px 5px 6px; }
    .palace-name { font-size: 11px; }
    .star-main { font-size: 9px; }
    .star-tag { font-size: 9px; }
    .center-title { font-size: 18px; }
    .input-panel { padding: 24px 16px; }
  }
</style>
</head>
<body>
<div class="app-wrapper">

  <!-- 헤더 -->
  <div class="app-header">
    <div class="header-ornament">◆ &nbsp; &nbsp; &nbsp; ◆ &nbsp; &nbsp; &nbsp; ◆</div>
    <div class="header-title-cn">紫微斗數</div>
    <div class="header-title-kr">자 미 두 수 명 반</div>
    <div class="header-line"></div>
  </div>

  <!-- 입력 폼 -->
  <div class="input-panel">
    <div class="input-grid">
      <div class="input-group">
        <label>생년 (양력)</label>
        <input type="number" id="in-year" placeholder="예: 1990" min="1900" max="2050" value="1990">
      </div>
      <div class="input-group">
        <label>월</label>
        <input type="number" id="in-month" placeholder="1~12" min="1" max="12" value="5">
      </div>
      <div class="input-group">
        <label>일</label>
        <input type="number" id="in-day" placeholder="1~31" min="1" max="31" value="15">
      </div>
      <div class="input-group">
        <label>성별</label>
        <select id="in-gender">
          <option value="male">남 (男)</option>
          <option value="female">여 (女)</option>
        </select>
      </div>
    </div>
    <div class="input-row-bottom">
      <div class="input-group">
        <label>생시 (24시)</label>
        <input type="number" id="in-hour" placeholder="0~23" min="0" max="23" value="8">
      </div>
      <div class="input-group">
        <label>분 (옵션)</label>
        <input type="number" id="in-minute" placeholder="0~59" min="0" max="59" value="0">
      </div>
      <button class="btn-generate" onclick="generateChart()">命 盤 작 성</button>
    </div>
  </div>

  <!-- 결과 -->
  <div id="result-section">
    <div class="chart-header">
      <div class="chart-title" id="chart-person-name">命 盤</div>
      <div class="chart-subtitle" id="chart-subtitle"></div>
    </div>

    <!-- 명반 격자 -->
    <div class="mingpan-container">
      <div class="mingpan-grid" id="mingpan-grid">
        <!-- JS로 생성 -->
      </div>
    </div>

    <!-- 대한 -->
    <div class="daihan-section">
      <div class="daihan-title">大 限 運 程</div>
      <div class="daihan-grid" id="daihan-grid"></div>
    </div>

    <!-- 사화 정보 -->
    <div class="info-section">
      <div class="info-title">四 化 星 配 置</div>
      <div class="four-trans-grid" id="four-trans-grid"></div>
    </div>
  </div>

  <div class="app-footer">
    紫微斗數 &nbsp;·&nbsp; 전통 명리학 기반 &nbsp;·&nbsp; 참고용으로만 활용하세요
  </div>
</div>

<script>
// ============================================================
// 자미두수 핵심 데이터 (인라인)
// ============================================================

const STEMS = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];

const NAYIN_TABLE = {

  "戊辰":"大林木","己巳":"大林木","庚午":"路傍土","辛未":"路傍土",

// 오행국별 자미성 위치 (음력 일 1~30)
const ZIWEI_POS_TABLE = {

function solarToLunar(sy, sm, sd) {
  // 해당 연도의 음력 1월 1일 찾기
  // 전년도와 해당년도 데이터로 계산

  // 입력 날짜의 절대일 계산
  const inputDays = dateToDays(sy, sm, sd);

  let targetYear = sy;
  // 해당 양력 날짜가 어느 음력 연도에 속하는지 확인
  if (LUNAR_DB[sy]) {
    const [bm, bd] = LUNAR_DB[sy];
    const newYearDays = dateToDays(sy, bm, bd);
    if (inputDays < newYearDays) {
      targetYear = sy - 1;
    }
  }

  const data = LUNAR_DB[targetYear];
  if (!data) {
    // 데이터 없으면 근사치 반환
    return { year: sy, month: sm, day: sd, isLeap: false, stem: getYearStem(sy), branch: getYearBranch(sy) };
  }

  const [baseM, baseD, months, leapMonth] = data;
  const newYearDays = dateToDays(targetYear, baseM, baseD);
  let diff = inputDays - newYearDays;

  if (diff < 0) {
    // 전년도
    targetYear--;
    const pdata = LUNAR_DB[targetYear];
    if (!pdata) return { year: sy, month: sm, day: sd, isLeap: false, stem: getYearStem(sy), branch: getYearBranch(sy) };
    const [pm, pd, pmonths, pleap] = pdata;
    const pNewYear = dateToDays(targetYear, pm, pd);
    diff = inputDays - pNewYear;
    return calcLunarDate(targetYear, pmonths, pleap, diff);
  }

  return calcLunarDate(targetYear, months, leapMonth, diff);
}

function calcLunarDate(lunarYear, months, leapMonth, diff) {
  let month = 1;
  let isLeap = false;
  let i = 0;
  let leapInserted = false;

  for (i = 0; i < months.length; i++) {
    const days = months[i];
    if (diff < days) break;
    diff -= days;
    // 윤달 삽입 체크
    if (!leapInserted && leapMonth > 0 && i + 1 === leapMonth) {
      // 다음 반복이 윤달
      leapInserted = true; // 이미 처리됨
    }
    month++;
  }

  // 윤달 보정
  let actualMonth = month;
  let actualIsLeap = false;
  if (leapMonth > 0) {
    if (month > leapMonth) {
      actualMonth = month - 1;
      if (month === leapMonth + 1) {
        actualIsLeap = true;
        actualMonth = leapMonth;
      }
    }
  }

  return {
    year: lunarYear,
    month: actualMonth,
    day: diff + 1,
    isLeap: actualIsLeap,
    stem: getYearStem(lunarYear),
    branch: getYearBranch(lunarYear)
  };
}

function dateToDays(y, m, d) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524;
}

function getYearStem(year) {
  return STEMS[(year - 4 + 1000) % 10];
}
function getYearBranch(year) {
  return BRANCHES[(year - 4 + 1000) % 12];
}
function getHourBranch(hour) {
  return BRANCHES[Math.floor(((hour + 1) % 24) / 2)];
}
function getHourIndex(hour) {
  return Math.floor(((hour + 1) % 24) / 2);
}

function getNayin(stem, branch) {
  return NAYIN_TABLE[stem + branch] || "不明";
}
function getJu(nayin) {
  const el = nayin.slice(-1);
  return NAYIN_TO_JU[el] || 5;
}

function getZiweiPos(lunarDay, ju) {
  const tbl = ZIWEI_POS_TABLE[ju];
  if (!tbl || lunarDay < 1) return 0;
  const idx = Math.min(lunarDay - 1, tbl.length - 1);
  return tbl[idx];
}

function getMingPos(lunarMonth, birthHour) {
  const hourIdx = getHourIndex(birthHour);
  // 인월(1월)=인궁(2), 월 순행 후 시지 역행
  let pos = (2 + (lunarMonth - 1)) % 12;
  pos = (pos - hourIdx + 12) % 12;
  return pos;
}

function getShenPos(lunarMonth, birthHour) {
  const hourIdx = getHourIndex(birthHour);
  let pos = (2 + (lunarMonth - 1) + hourIdx) % 12;
  return pos;
}

// 14주성 배치
function placeMainStars(ziweiPos) {
  const stars = Array.from({length:12}, () => []);
  const tianfuPos = TIANFU_MAP[ziweiPos];

  // 자미계열 (자미 위치 기준 역행 배치)
  // offset은 순행 기준: 자미=0, 천기=-1(+11), 태양=-3(+9), 무곡=-4(+8), 천동=-5(+7), 염정=-8(+4)
  // 명반 검증: 자미戌(10)기준 → 천기酉(9)✓, 태양未(7)✓, 무곡午(6)✓, 천동巳(5)✓, 염정寅(2)✓
  const zGroup = [
    {cn:"紫微",kr:"자미",off:0},
    {cn:"天機",kr:"천기",off:11},  // -1
    {cn:"太陽",kr:"태양",off:9},   // -3
    {cn:"武曲",kr:"무곡",off:8},   // -4
    {cn:"天同",kr:"천동",off:7},   // -5
    {cn:"廉貞",kr:"염정",off:4},   // -8
  ];

  zGroup.forEach(s => {
    const pos = (ziweiPos + s.off) % 12;
    stars[pos].push({...s, cat:"main"});
  });

  // 천부계열
  const fGroup = [
    {cn:"天府",kr:"천부",off:0},
    {cn:"太陰",kr:"태음",off:1},
    {cn:"貪狼",kr:"탐랑",off:2},
    {cn:"巨門",kr:"거문",off:3},
    {cn:"天相",kr:"천상",off:4},
    {cn:"天梁",kr:"천량",off:5},
    {cn:"七殺",kr:"칠살",off:6},
    {cn:"破軍",kr:"파군",off:10},
  ];
  fGroup.forEach(s => {
    const pos = (tianfuPos + s.off) % 12;
    stars[pos].push({...s, cat:"main"});
  });

  return stars;
}

function placeMinorStars(stem, branch, lunarMonth, birthHour) {
  const stars = Array.from({length:12}, () => []);
  const hIdx = getHourIndex(birthHour);
  const brIdx = BRANCHES.indexOf(branch);

  // 좌보 (진=4에서 순행, 월기준)
  // 검증: 음력7월 → (4+7-1)%12=10(戌) ✓ 명반 확인
  stars[(4 + lunarMonth - 1) % 12].push({cn:"左輔",kr:"좌보",cat:"good"});

  // 우필 (술=10에서 역행)
  stars[(10 - (lunarMonth - 1) + 12) % 12].push({cn:"右弼",kr:"우필",cat:"good"});

  // 문창 (술=10에서 역행, 시기준)
  stars[(10 - hIdx + 12) % 12].push({cn:"文昌",kr:"문창",cat:"good"});

  // 문곡 (진=4에서 순행, 시기준)
  stars[(4 + hIdx) % 12].push({cn:"文曲",kr:"문곡",cat:"good"});

  // 천괴 (천간기준)
  const kuiMap = {"甲":1,"乙":0,"丙":11,"丁":11,"戊":2,"己":1,"庚":8,"辛":9,"壬":4,"癸":4};
  stars[kuiMap[stem]||0].push({cn:"天魁",kr:"천괴",cat:"good"});

  // 천월
  const yueMap = {"甲":7,"乙":8,"丙":9,"丁":9,"戊":6,"己":7,"庚":4,"辛":3,"壬":2,"癸":2};
  stars[yueMap[stem]||0].push({cn:"天鉞",kr:"천월",cat:"good"});

  // 록존
  const lzPos = LUZUN_POS[stem] || 0;
  stars[lzPos].push({cn:"祿存",kr:"록존",cat:"good"});

  // 경양 = 록존+1, 타라 = 록존-1
  stars[(lzPos+1)%12].push({cn:"擎羊",kr:"경양",cat:"bad"});
  stars[(lzPos-1+12)%12].push({cn:"陀羅",kr:"타라",cat:"bad"});

  // 천마 (지지기준): 申子辰→寅(2), 亥卯未→巳(5), 寅午戌→申(8), 巳酉丑→亥(11)
  // 검증: 卯년 → 亥卯未 → 巳(5) ✓ 명반 확인
  const tmaMap = {"寅":8,"午":8,"戌":8,"申":2,"子":2,"辰":2,"亥":5,"卯":5,"未":5,"巳":11,"酉":11,"丑":11};
  const tmaPos = tmaMap[branch] !== undefined ? tmaMap[branch] : 8;
  stars[tmaPos].push({cn:"天馬",kr:"천마",cat:"good"});

  // 화성 (지지+시 기준)
  const hxBase = {"寅":2,"午":2,"戌":2,"申":2,"子":2,"辰":2,"亥":9,"卯":9,"未":9,"巳":3,"酉":3,"丑":3};
  const hxPos = ((hxBase[branch]||2) + hIdx) % 12;
  stars[hxPos].push({cn:"火星",kr:"화성",cat:"bad"});

  // 영성 (지지+시 기준)
  // 검증: 卯년,축시(hIdx=1) → lxBase["卯"]=10 → (10+1)%12=11(亥) ✓ 명반 확인
  const lxBase = {"寅":11,"午":11,"戌":11,"申":5,"子":5,"辰":5,"亥":10,"卯":10,"未":10,"巳":3,"酉":3,"丑":3};
  const lxPos = ((lxBase[branch]||0) + hIdx) % 12;
  stars[lxPos].push({cn:"鈴星",kr:"영성",cat:"bad"});

  // 지공 (해=11에서 역행)
  stars[(11 - hIdx + 12) % 12].push({cn:"地空",kr:"지공",cat:"bad"});

  // 지겁 (해=11에서 순행)
  stars[(11 + hIdx) % 12].push({cn:"地劫",kr:"지겁",cat:"bad"});

  return stars;
}

// │  辰  │[중앙]       │  酉  │
// │  卯  │[중앙]       │  戌  │
// │  寅  │  丑  │  子  │  亥  │  ← 하단 (좌→우)
// └──────┴──────┴──────┴──────┘
const GRID_ORDER = [
  // 상단 행: 좌→우 (巳午未申)
  {grid:0,  branch:5},  // 巳
  {grid:1,  branch:6},  // 午
  {grid:2,  branch:7},  // 未
  {grid:3,  branch:8},  // 申
  // 우측 열: 상→하 (酉戌)
  {grid:7,  branch:9},  // 酉
  {grid:11, branch:10}, // 戌
  // 하단 행: 우→좌 (亥子丑寅)
  {grid:15, branch:11}, // 亥
  {grid:14, branch:0},  // 子
  {grid:13, branch:1},  // 丑
  {grid:12, branch:2},  // 寅
  // 좌측 열: 하→상 (卯辰)
  {grid:8,  branch:3},  // 卯
  {grid:4,  branch:4},  // 辰
];

// ============================================================
// 메인 렌더링
// ============================================================

function generateChart() {
  const year = parseInt(document.getElementById('in-year').value) || 1990;
  const month = parseInt(document.getElementById('in-month').value) || 1;
  const day = parseInt(document.getElementById('in-day').value) || 1;
  const hour = parseInt(document.getElementById('in-hour').value) || 0;
  const gender = document.getElementById('in-gender').value;

  // 음양력 변환
  const lunar = solarToLunar(year, month, day);

  const stem = getYearStem(lunar.year);
  const branch = getYearBranch(lunar.year);
  const nayin = getNayin(stem, branch);
  const ju = getJu(nayin);

  const ziweiPos = getZiweiPos(lunar.day, ju);
  const mingPos = getMingPos(lunar.month, hour);
  const shenPos = getShenPos(lunar.month, hour);

  const mainStars = placeMainStars(ziweiPos);
  const minorStars = placeMinorStars(stem, branch, lunar.month, hour);
  const trans = STEM_TRANS[stem] || {};

  // 사화 별 위치 맵
  const transStarPos = {};
  for (const [type, starCn] of Object.entries(trans)) {
    // 해당 별이 있는 궁 찾기
    for (let p = 0; p < 12; p++) {
      const found = mainStars[p].find(s => s.cn === starCn) ||
                    minorStars[p].find(s => s.cn === starCn);
      if (found) {
        if (!transStarPos[p]) transStarPos[p] = [];
        const labelMap = {"化祿":"祿","化權":"權","化科":"科","化忌":"忌"};
        transStarPos[p].push({star: starCn, type, label: labelMap[type]||type});
        break;
      }
    }
  }

  // 대한 계산
  const stemIdx = STEMS.indexOf(stem);
  const isYang = [0,2,4,6,8].includes(stemIdx);
  const isMale = gender === 'male';
  const isForward = (isYang && isMale) || (!isYang && !isMale);
  const startAge = ju;

  const daihanList = [];
  for (let i = 0; i < 12; i++) {
    const age = startAge + i * 10;
    const pos = isForward ? (mingPos + i) % 12 : (mingPos - i + 12) % 12;
    daihanList.push({ seq: i+1, startAge: age, endAge: age+9, pos, branch: BRANCHES[pos], branchKr: BRANCHES_KR[pos] });
  }

  // 궁 데이터 조합
  const palaces = [];
  for (let i = 0; i < 12; i++) {
    const palaceSeq = (i - mingPos + 12) % 12; // 명궁 기준 순서
    palaces.push({
      branchIdx: i,
      branch: BRANCHES[i],
      branchKr: BRANCHES_KR[i],
      palaceName: PALACE_NAMES[palaceSeq],
      mainStars: mainStars[i],
      minorStars: minorStars[i],
      isMing: i === mingPos,
      isShen: i === shenPos,
      trans: transStarPos[i] || [],
      daihan: daihanList.find(d => d.pos === i)
    });
  }

  // UI 업데이트
  const stemKr = STEMS_KR[STEMS.indexOf(stem)];
  const branchKr = BRANCHES_KR[BRANCHES.indexOf(branch)];
  const hourBranch = getHourBranch(hour);
  const hourBranchKr = BRANCHES_KR[BRANCHES.indexOf(hourBranch)];

  document.getElementById('chart-person-name').textContent = `${lunar.year}년 ${stem}${branch}年 命盤`;
  document.getElementById('chart-subtitle').textContent =
    `음력 ${lunar.year}.${lunar.month}${lunar.isLeap?'(윤)':''}.${lunar.day} · ${hour}시(${hourBranch}시) · ${nayin} · ${ju}국`;

  renderMingpan(palaces, {
    mingPos, shenPos, ziweiPos,
    year, month, day, hour, gender,
    lunar, stem, branch, nayin, ju
  });

  renderDaihan(daihanList);
  renderTransformations(trans);

  document.getElementById('result-section').style.display = 'block';
  document.getElementById('result-section').scrollIntoView({behavior:'smooth', block:'start'});
}

// ============================================================
// 명반 그리드 렌더링
// ============================================================

function renderMingpan(palaces, info) {
  const grid = document.getElementById('mingpan-grid');
  grid.innerHTML = '';

  // 16셀 생성 (4×4)
  const cells = Array(16).fill(null);

  GRID_ORDER.forEach(({grid: gi, branch: bi}) => {
    cells[gi] = palaces[bi];
  });

  for (let i = 0; i < 16; i++) {
    const row = Math.floor(i / 4);
    const col = i % 4;
    const isCenter = (row === 1 || row === 2) && (col === 1 || col === 2);

    if (isCenter) {
      if (i === 5) {
        // 중앙 정보 패널 (2×2 합치기)
        const centerDiv = document.createElement('div');
        centerDiv.className = 'palace-center';
        centerDiv.style.gridColumn = '2/4';
        centerDiv.style.gridRow = '2/4';
        centerDiv.innerHTML = renderCenterInfo(info);
        grid.appendChild(centerDiv);
      }
      // 6,9,10은 건너뜀
      continue;
    }

    if (!cells[i]) {
      const empty = document.createElement('div');
      empty.className = 'palace-cell';
      grid.appendChild(empty);
      continue;
    }

    const p = cells[i];
    const cell = document.createElement('div');
    cell.className = 'palace-cell';

    // 태그 라인
    let tags = '';
    if (p.isMing) tags += '<span class="tag-ming">命</span>';
    if (p.isShen) tags += '<span class="tag-shen">身</span>';

    // 주성 HTML
    let mainHTML = '';
    p.mainStars.forEach(s => {
      const tranList = p.trans.filter(t => t.star === s.cn);
      let badge = '';
      if (tranList.length > 0) {
        badge = `<span class="transform-badge">${tranList.map(t=>t.label).join('')}</span>`;
      }
      mainHTML += `<span class="star-tag star-main" style="position:relative">${s.cn}${badge}</span>`;
    });

    // 보조성 HTML
    let minorHTML = '';
    p.minorStars.forEach(s => {
      const cat = s.cat === 'good' ? 'star-aux-good' : 'star-aux-bad';
      const tranList = p.trans.filter(t => t.star === s.cn);
      let badge = '';
      if (tranList.length > 0) badge = `<span class="transform-badge">${tranList.map(t=>t.label).join('')}</span>`;
      minorHTML += `<span class="star-tag ${cat}" style="position:relative">${s.cn}${badge}</span>`;
    });

    // 대한
    const dhInfo = p.daihan ? `<div class="daihan-info">${p.daihan.startAge}~${p.daihan.endAge}</div>` : '';

    cell.innerHTML = `
      <div class="palace-label">${p.branchKr}(${p.branch})</div>
      <div class="palace-name">${p.palaceName.cn} ${tags}</div>
      <div class="palace-stars">${mainHTML}${minorHTML}</div>
      ${dhInfo}
    `;
    grid.appendChild(cell);
  }
}

function renderCenterInfo(info) {
  const stemIdx = STEMS.indexOf(info.stem);
  const branchIdx = BRANCHES.indexOf(info.branch);
  const stemKr = STEMS_KR[stemIdx];
  const branchKr = BRANCHES_KR[branchIdx];
  const hourBranch = getHourBranch(info.hour);
  const juNames = {2:"水二局",3:"木三局",4:"金四局",5:"土五局",6:"火六局"};
  const genderTxt = info.gender === 'male' ? '남(男)' : '여(女)';

  return `
    <div class="center-title">紫微斗數<br>命　盤</div>
    <div class="center-divider"></div>
    <div class="center-info-grid">
      <div class="center-info-item">
        <span class="center-info-label">연주</span>
        <span class="center-info-value">${info.stem}${info.branch}年</span>
      </div>
      <div class="center-info-item">
        <span class="center-info-label">납음</span>
        <span class="center-info-value">${info.nayin}</span>
      </div>
      <div class="center-info-item">
        <span class="center-info-label">오행국</span>
        <span class="center-info-value">${juNames[info.ju]||info.ju+'국'}</span>
      </div>
      <div class="center-info-item">
        <span class="center-info-label">성별</span>
        <span class="center-info-value">${genderTxt}</span>
      </div>
      <div class="center-info-item">
        <span class="center-info-label">음력</span>
        <span class="center-info-value">${info.lunar.year}.${info.lunar.month}.${info.lunar.day}</span>
      </div>
      <div class="center-info-item">
        <span class="center-info-label">생시</span>
        <span class="center-info-value">${hourBranch}시 (${info.hour}시)</span>
      </div>
    </div>
  `;
}

function renderDaihan(list) {
  const grid = document.getElementById('daihan-grid');
  grid.innerHTML = list.slice(0,12).map(d => `
    <div class="daihan-item">
      <div class="daihan-age">${d.startAge}~${d.endAge}세</div>
      <div class="daihan-branch">${d.branch}</div>
      <div class="daihan-palace">${d.branchKr}궁</div>
    </div>
  `).join('');
}

function renderTransformations(trans) {
  const types = [
    {key:"化祿", label:"化祿 (화록)", desc:"재물·복", color:"#c8943a"},
    {key:"化權", label:"化權 (화권)", desc:"권위·리더십", color:"#8a6020"},
    {key:"化科", label:"化科 (화과)", desc:"명예·학문", color:"#2e7d5e"},
    {key:"化忌", label:"化忌 (화기)", desc:"장애·주의", color:"#8a1c1c"},
  ];
  document.getElementById('four-trans-grid').innerHTML = types.map(t => `
    <div class="trans-item">
      <div class="trans-type" style="color:${t.color}">${t.label}</div>
      <div class="trans-star">${trans[t.key] || '—'}</div>
      <div style="font-size:9px;color:rgba(245,237,224,0.4);margin-top:3px;letter-spacing:1px">${t.desc}</div>
    </div>
  `).join('');
}

// 엔터키 지원
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') generateChart();
});
</script>
</body>
